# render.yaml — Fear-Free Night Navigator
services:
  - type: web
    name: fear-free-navigator
    runtime: python
    region: singapore
    plan: free

    buildCommand: pip install -r requirements.txt

    # outputs/ (css_cache.npz + safety_model.pkl) must be committed to git
    startCommand: bash start_render.sh

    healthCheckPath: /health

    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: AUTOPING_ENABLED
        value: "true"
      - key: RENDER
        value: "true"
